<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>#163 light mode — Share sheet</title>
<link rel="stylesheet" href="./assets/theme.css" />
<style>
  .content {
    position: relative;
    z-index: 1;
    height: 100%;
  }
  .backdrop-question {
    position: absolute;
    top: 90px;
    left: 32px;
    right: 32px;
    font-family: 'golos-text';
    font-weight: 600;
    font-size: 34px;
    line-height: 1.15;
    color: var(--darker);
    opacity: 0.35;
  }
  .scrim {
    position: absolute;
    inset: 0;
    background: rgba(17, 21, 22, 0.12);
  }
  .row-icon { stroke: var(--darker); }
</style>
</head>
<body>
  <div class="frame-label">
    <span>Share sheet — over the light canvas (unchanged palette, new context)</span>
    <div class="phone">
      <div class="screen">
        <div class="notch"></div>
        <img class="texture" src="./assets/background-light.svg" alt="" />
        <div class="content">
          <p class="backdrop-question">What is something that makes you feel small?</p>
          <div class="scrim"></div>
          <div class="sheet">
            <div class="sheet-header">
              <span class="sheet-title">Share</span>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--darker)" stroke-width="2.2">
                <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
              </svg>
            </div>
            <div class="sheet-row">
              <svg class="row-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M10 13a5 5 0 007.07 0l2.83-2.83a5 5 0 00-7.07-7.07l-1.5 1.5M14 11a5 5 0 00-7.07 0L4.1 13.83a5 5 0 007.07 7.07l1.5-1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>Share link</span>
            </div>
            <div class="sheet-row">
              <svg class="row-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2">
                <rect x="7" y="2" width="10" height="20" rx="2" />
                <path d="M11 18h2" stroke-linecap="round" />
              </svg>
              <span>Story image</span>
            </div>
            <div class="sheet-row">
              <svg class="row-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="M21 15l-5-5L5 21" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>Post image</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="frame-label">
    <span>Share sheet — palette reference (unchanged from today)</span>
    <div style="width:390px; background:#fff; border-radius:20px; overflow:hidden; box-shadow: 0 20px 40px rgba(20,10,40,.18); font-family:'golos-text';">
      <div class="sheet-header" style="border-radius:0;">
        <span class="sheet-title">Share</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--darker)" stroke-width="2.2">
          <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
        </svg>
      </div>
      <div class="sheet-row">
        <svg class="row-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2">
          <path d="M10 13a5 5 0 007.07 0l2.83-2.83a5 5 0 00-7.07-7.07l-1.5 1.5M14 11a5 5 0 00-7.07 0L4.1 13.83a5 5 0 007.07 7.07l1.5-1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Share link</span>
      </div>
      <div class="sheet-row">
        <svg class="row-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2">
          <rect x="7" y="2" width="10" height="20" rx="2" />
          <path d="M11 18h2" stroke-linecap="round" />
        </svg>
        <span>Story image</span>
      </div>
      <div class="sheet-row" style="padding-bottom: 28px;">
        <svg class="row-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="M21 15l-5-5L5 21" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Post image</span>
      </div>
    </div>
  </div>
</body>
</html>
