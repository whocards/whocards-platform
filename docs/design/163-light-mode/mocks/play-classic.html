<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>#163 light mode — Play (Classic / Global Game)</title>
<link rel="stylesheet" href="./assets/theme.css" />
<style>
  .content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 8px 16px;
  }
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 32px;
  }
  .question {
    font-family: 'golos-text';
    font-weight: 600;
    font-size: 42px;
    line-height: 1.15;
    color: var(--darker);
  }
</style>
</head>
<body>
  <div class="frame-label">
    <span>Play — Classic / Global Game — light</span>
    <div class="phone">
      <div class="screen">
        <div class="notch"></div>
        <img class="texture" src="./assets/background-light.svg" alt="" />
        <div class="content">
          <div class="top-bar" style="padding-top: 54px;">
            <div class="close-chip">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.4">
                <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
              </svg>
            </div>
          </div>
          <div class="card-area">
            <p class="question">What is something that makes you feel small?</p>
          </div>
          <div class="player-bar">
            <div class="bar-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>Back</span>
            </div>
            <div class="bar-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M4 12v6a2 2 0 002 2h12a2 2 0 002-2v-6M16 6l-4-4-4 4M12 2v14" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>Share</span>
            </div>
            <div class="bar-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2">
                <circle cx="12" cy="12" r="9" />
                <path d="M3 12h18M12 3c2.5 2.5 3.5 5.5 3.5 9s-1 6.5-3.5 9c-2.5-2.5-3.5-5.5-3.5-9s1-6.5 3.5-9z" />
              </svg>
              <span>Language</span>
            </div>
            <div class="bar-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>Next</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
