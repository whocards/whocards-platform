name: Mobile gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call: {}

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/website is intentionally excluded from this gate's typecheck. Its `astro check`
      # needs astro-icon's build-time type generation (.astro/icon.d.ts), which only a full
      # `astro build` produces — and that build needs DB secrets (with-env). The website is
      # validated by its own Netlify build on deploy. This gate covers the mobile app + the
      # shared packages it depends on, which is what mobile releases gate on.
      - name: Format check
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Typecheck + unit tests (mobile + shared packages)
        run: pnpm exec turbo run typecheck test --filter='!website'

      # TODO(#maestro): add Maestro e2e suite once a simulator is available in CI.
      # When ready: install maestro, start the dev server, run `pnpm --filter mobile e2e`.
