name: Mobile release

# Triggers on version tags (e.g. v1.0.0, v1.2.3).
# This workflow is intentionally inert until the following one-time setup is complete (#11/#12):
#
#   Required secrets (Settings → Secrets → Actions):
#     EXPO_TOKEN — Expo account token (`eas whoami` must return the project owner)
#
#   That is the ONLY CI secret. Both submit credentials live on EAS, not in CI:
#     - iOS App Store Connect API Key  — uploaded via `eas credentials` (App Store Connect)
#     - Android Play service-account key — uploaded via `eas credentials` (service account)
#   eas submit pulls both, authed by EXPO_TOKEN, so no APP_STORE_* secrets are needed.
#
#   One-time EAS setup (#11):
#     1. Run `eas init` in apps/mobile to obtain a projectId.
#     2. Commit the projectId to apps/mobile/app.json extra.eas.projectId.
#     3. Replace the TODO-RUN-eas-init placeholder in apps/mobile/app.json and
#        apps/mobile/eas.json with the real values.
#
# Until those steps are done, the eas build / eas submit / eas update steps
# will fail fast with an auth or config error — they will NOT deploy anything silently.
#
# EXTRA SAFETY: the EAS jobs (build / submit / ota-update) are also gated on the repo
# variable EAS_RELEASE_ENABLED. They are SKIPPED unless it is set to 'true', so even a
# stray `v*` tag only runs the quality gate. Flip the variable when you are ready to ship.
# iOS and Android build/submit together under that single switch.

on:
  push:
    tags:
      - 'v*'

jobs:
  gate:
    name: Quality gate
    uses: ./.github/workflows/mobile-gate.yml

  build:
    name: EAS Build (iOS + Android)
    needs: gate
    # Safety guard — see header. EAS jobs stay inert until EAS_RELEASE_ENABLED=true.
    if: vars.EAS_RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v9
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (production)
        working-directory: apps/mobile
        run: eas build --platform ios --profile production --non-interactive

      - name: Build Android (production)
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive

  submit:
    name: EAS Submit (TestFlight + Play Internal)
    needs: build
    if: vars.EAS_RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v9
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # iOS ASC API Key lives on EAS (uploaded via `eas credentials`), exactly like the
      # Android service-account key — eas-cli pulls it, authed by EXPO_TOKEN. No secret here.
      - name: Submit iOS (TestFlight)
        working-directory: apps/mobile
        run: eas submit --platform ios --profile production --latest --non-interactive

      # Service-account key is stored on EAS (uploaded via `eas credentials`), so no
      # key file or secret is needed here — eas-cli pulls it, authed by EXPO_TOKEN.
      - name: Submit Android (Play Internal Testing)
        working-directory: apps/mobile
        run: eas submit --platform android --profile production --latest --non-interactive

  ota-update:
    name: EAS Update (OTA → production channel)
    needs: submit
    if: vars.EAS_RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v9
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        working-directory: apps/mobile
        run: eas update --channel production --message "${{ github.ref_name }}" --non-interactive
