packages:
  - apps/*
  - packages/*
  - tooling/*

allowBuilds:
  '@parcel/watcher': true
  core-js: false
  esbuild: true
  sharp: false
  unrs-resolver: false

# Single source of truth for shared dependency versions.
# Packages reference these with `"dep": "catalog:"` instead of pinning.
catalog:
  # language + build
  typescript: ^5.9.3
  vitest: ^4.0.15
  tsup: ^8.5.1

  # env validation (Standard Schema based — see each package's keys.ts)
  '@t3-oss/env-core': ^0.13.8
  zod: ^4.1.13

  # tRPC (in-app router — see ADR-0002)
  '@trpc/server': ^11.7.2
  '@trpc/client': ^11.7.2
  '@tanstack/react-query': ^5.90.12

  # react (shared major across web React-DOM islands + React Native)
  react: ^19.2.1
  react-dom: ^19.2.1
  '@types/react': ^19.2.7
  '@types/react-dom': ^19.2.3
  '@types/node': ^24.10.2

# Supply-chain guard: quarantine newly published versions for 2 days (2880 min)
# before they're installable.
minimumReleaseAge: 2880
# TEMPORARY excludes: versions this PR pulls in that were published <2 days ago, so
# the lockfile would otherwise be rejected. All age out by 2026-06-27 — remove this
# whole block then (tracked in the cleanup issue).
minimumReleaseAgeExclude:
  - posthog-js@1.393.4
  - '@posthog/core@1.37.2'
  - '@posthog/types@1.391.1'
  - playwright@1.61.1
  - playwright-core@1.61.1
  - '@playwright/test@1.61.1'
