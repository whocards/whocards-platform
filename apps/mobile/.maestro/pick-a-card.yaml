# The Pick a Card Game: choose it in the landing Game picker, then verify the
# deal loop — Pick reveals a card, Next returns to the pick screen, Back re-reads
# the last card. Questions are shuffled, so the flow asserts on the pick button's
# presence/absence rather than specific question text. Buttons are matched by
# their accessibility labels (a button's children are collapsed behind its label
# in the iOS accessibility tree).
#
# Run: pnpm --filter mobile e2e:ios  (or e2e:android)   (needs the app installed on a booted device)
appId: ${APP_ID}
tags:
  - ios
  - android
---
- launchApp:
    clearState: true # start clean: default Game is Classic
- assertVisible: 'Game: Classic'
- tapOn: 'Game: Classic'
- assertVisible: 'Choose your game'
- tapOn: 'Pick a Card'
- assertVisible: 'Game: Pick a Card'
- tapOn: 'Play'

# The pick screen: the deal button is the only card-area content.
- assertVisible: 'Pick a card'
- assertVisible: 'Tap to pick a card'
- tapOn: 'Pick a card'
- waitForAnimationToEnd
- assertNotVisible: 'Pick a card' # a card is revealed
- assertVisible: 'Tap for next card'

# Tapping the revealed card puts it down and returns to the pick screen
# (never straight to another card).
- tapOn:
    point: '50%,45%' # mid-card
- assertVisible: 'Pick a card'

# Back re-reads the last dealt card.
- tapOn:
    point: '50%,10%' # reveal the chrome (above the deck, not on a card)
- tapOn: 'previous question'
- waitForAnimationToEnd
- assertNotVisible: 'Pick a card'
