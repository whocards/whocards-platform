# WhoCards mobile — Library → Play smoke flow.
#
# Maestro is the Expo-recommended E2E tool (see docs/e2e-testing.md). Run against
# a simulator/emulator that has the app installed:
#
#   maestro test .maestro/library.yml
#
# `appId` must match the built app's native id (app.json ios.bundleIdentifier /
# android.package). NOTE: not yet run on a device in CI — see docs/e2e-testing.md.
appId: cc.whocards.mobile
---
- launchApp
# Library screen renders the registry from @whocards/decks
- assertVisible: 'Your library'
- assertVisible: 'AI Check-In'
# Open a deck -> the Play screen (shared @whocards/decks engine)
- tapOn: 'AI Check-In'
- assertVisible: 'Next'
# The headless engine advances; prev becomes available
- tapOn: 'Next'
- assertVisible: 'Prev'
