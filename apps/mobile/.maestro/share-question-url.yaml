# On-device confirmation of the share-link fix (#101): tapping Share must put the
# question's web URL on the OS share sheet — not just the raw question text. We cold
# deep-link to q=1 (default `library` deck, English) so the shared link is
# deterministic — https://whocards.cc/play?lang=en&q=1 — then assert that link shows
# in Android's share-sheet content preview.
#
# Android-only: Android's Sharesheet renders a text/link preview we can match on; the
# iOS share sheet doesn't expose the URL as matchable text (the iOS share tap is
# exercised by play-language-share.yaml). The URL-building logic itself is unit-tested
# in src/__tests__/share-url.test.ts.
#
# Run: pnpm --filter mobile e2e:android   (Android-only flow; needs the app installed on a booted device)
appId: ${APP_ID}
tags:
  - android
  - android-only
---
- launchApp:
    clearState: true # default language (en) so the shared URL is lang=en
- stopApp # cold deep-link so q=1 renders in natural order (no shuffle)
- openLink: mobile://play/library?q=1
- assertVisible: '(?s).*most interesting thing you have learned recently.*'

# Reveal the auto-hiding chrome, fire the share, and confirm the link shows in the share
# sheet preview. A freshly booted emulator can drop the very first ACTION_SEND before the
# system share sheet (com.android.intentresolver) has indexed its targets — the sheet just
# never appears — so retry the whole reveal → share → assert sequence; the second attempt
# lands once the resolver is warm. (The chrome auto-hides between attempts, hence the
# re-reveal tap inside the retry.)
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          point: '50%,45%'
      - assertVisible: 'change language'
      - tapOn: 'share question'
      # Android's share sheet previews the shared text, which now carries the web link.
      - assertVisible: '(?s).*whocards\.cc/play.*q=1.*'
- takeScreenshot: .maestro/artifacts/share-question-url
